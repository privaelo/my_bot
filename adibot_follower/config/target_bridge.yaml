# ROS <-> Gazebo bridge for the moving target (see models/target/model.sdf)
# Clock is bridged separately by spawn_target.launch.py's bridge_clock arg,
# not here -- two independent parameter_bridge processes both bridging
# /clock caused intermittent "jump back in time" tf resets when composed
# with adibot's own clock bridge (verified empirically in follow.launch.py).

- ros_topic_name: /target/cmd_vel
  gz_topic_name: /model/target/cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- ros_topic_name: /target/odom
  gz_topic_name: /model/target/odometry
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS