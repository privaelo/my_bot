# Obstacle spec for the cluttered follow world.
#
# scripts/gen_world.py reads this file and generates worlds/cluttered.sdf plus
# the matching occupancy grid (config/cluttered.map.pgm/.yaml) from the same
# placements, so the planner map and the sim world can never disagree.
# Regenerate after editing:
#   python3 scripts/gen_world.py
#
# Output is deterministic for a given spec: same file -> byte-identical world
# and map.

seed: 42

world:
  name: cluttered
  half_extent: 10.0       # arena spans [-10, 10] m in x and y
  wall_thickness: 0.2     # perimeter walls, innermost face at half_extent
  wall_height: 1.0
  wall_color: '0.25 0.25 0.25'

map:
  resolution: 0.05        # m/cell -> 400x400 grid

obstacles:
  count: 25
  height_range: [0.6, 1.4]
  box_side_range: [0.4, 1.2]        # boxes stay axis-aligned (exact raster)
  cylinder_radius_range: [0.15, 0.5]
  min_clearance: 1.0      # min gap between footprints and to the walls (m)
  # visual only; drawn from the seeded rng after placement, so editing the
  # palette recolors obstacles without moving them
  palette:
    - '0.80 0.25 0.25'    # red
    - '0.90 0.55 0.15'    # orange
    - '0.85 0.78 0.20'    # yellow
    - '0.30 0.70 0.30'    # green
    - '0.20 0.70 0.65'    # teal
    - '0.25 0.45 0.85'    # blue
    - '0.60 0.35 0.75'    # purple
    - '0.85 0.35 0.60'    # magenta

# No obstacles within r of these points: robot spawns at the origin
# (launch_sim.launch.py) and the target's waypoint circuit (Phase 2) visits
# the four corners.
keep_out:
  - {x: 0.0, y: 0.0, r: 1.5}
  - {x: 6.0, y: 6.0, r: 1.5}
  - {x: -6.0, y: 6.0, r: 1.5}
  - {x: -6.0, y: -6.0, r: 1.5}
  - {x: 6.0, y: -6.0, r: 1.5}

# No obstacles within r of the straight legs connecting these points (in
# order, cyclic) -- must match target_driver's waypoint circuit in
# follower_params.yaml. The target drives point-to-point with no obstacle
# avoidance, so its direct path has to stay physically clear.
keep_out_corridor:
  radius: 0.6
  path:
    - {x: 6.0, y: 6.0}
    - {x: -6.0, y: 6.0}
    - {x: -6.0, y: -6.0}
    - {x: 6.0, y: -6.0}
