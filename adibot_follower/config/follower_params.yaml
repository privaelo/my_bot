target_driver:
  ros__parameters:
    speed: 0.5              # m/s along the circuit
    control_rate: 20.0      # Hz
    loop: true              # restart the circuit after the last waypoint
    goal_tolerance: 0.3     # m, waypoint reached
    k_heading: 1.5          # P gain on heading error
    max_angular: 1.5        # rad/s
    slow_angle: 0.8         # rad, turn in place above this heading error
    map_frame: map
    # map-frame circuit through the corner keep-out zones (obstacles.yaml)
    waypoints: [6.0, 6.0, -6.0, 6.0, -6.0, -6.0, 6.0, -6.0]

map_loader:
  ros__parameters:
    frame_id: map

global_planner:
  ros__parameters:
    replan_rate: 2.0         # Hz
    # Sized against the follower's ~0.30 m circumscribed footprint radius plus
    # pure-pursuit corner-cutting. 0.4 m left only ~0.10 m body margin when the
    # A* path hugged an obstacle and the robot clipped/wedged; 0.5 m still let it
    # graze (~0.23 m worst-case body clearance). 0.6 m gives a ~0.30 m body floor.
    # Requires obstacles.yaml min_clearance 1.4 m: 1.4 - 2*0.6 = 0.2 m free
    # corridor between footprints (at min_clearance 1.0 m, 0.6 m sealed passages
    # and stranded the robot). See docs/known_issues.md "Follower collides with
    # obstacles / wedges".
    inflation_radius: 0.6    # m, grown around every occupied cell
    map_frame: map
    robot_frame: base_link
    # goal comes from goal_pose (remapped to /target/predicted_pose in launch)

target_predictor:
  ros__parameters:
    prediction_horizon: 1.0  # s, 0 disables prediction for ablation
    map_frame: map

pure_pursuit:
  ros__parameters:
    lookahead_distance: 0.3  # m, tighter path tracking (less corner-cut)
    standoff_distance: 1.0   # m, trails the target instead of ramming it
    max_linear: 0.8          # m/s
    max_angular: 1.5         # rad/s
    control_rate: 20.0       # Hz
    map_frame: map
    robot_frame: base_link